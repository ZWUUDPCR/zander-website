role: Peace Researcher
bio: |
 I am a peace and conflict researcher working at the intersection of gender, climate change, and violence, with a strong interest in policy-relevant and practice-oriented research. I recently completed my MSSc in Peace and Conflict Studies at Uppsala University as a Rotary Peace Fellow. My master’s thesis examined how gender inequality moderates the relationship between climate change and communal violence across Africa and the Middle East and North Africa (MENA), using quantitative analysis. Since August 2025, I have been an Erasmus+ Research Trainee at the Åland Islands Peace Institute, supporting research and education on demilitarisation, autonomy, and minority protection. Alongside research, I focus on strengthening the peacebuilding field through collaboration and open knowledge-sharing. At Search for Common Ground, I co-led ConnexUs, a global platform connecting peacebuilders, researchers, and funders. I have also worked in Youth, Peace & Security advocacy at Search for Common Ground and as +Peace Program Manager at the Alliance for Peacebuilding. I hold an MSSc from Uppsala University and a BA in Political Science, French, and Peace Studies from Manchester University.

